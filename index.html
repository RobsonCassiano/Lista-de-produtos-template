<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./produtos.js" defer></script>
    <title>Lista de Produtos</title>
</head>
<body>
    <header class="hero">
        <div class="hero__content">
            <p class="hero__eyebrow">Vitrine em destaque</p>
            <h1>Ofertas para montar seu setup com estilo de e-commerce</h1>
            <p class="hero__text">
                Compare produtos, veja avaliacao, parcela estimada e encontre o item ideal para sua mesa.
            </p>
        </div>
    </header>

    <main class="catalogo">
        <section class="catalogo__topo">
            <div>
                <p class="catalogo__rotulo">Lista de produtos</p>
                <h2>Anuncios em destaque</h2>
            </div>
            <p class="catalogo__descricao">Selecao com visual de loja online, pronta para receber os cards dinamicos.</p>
        </section>

        <section id="listaProdutos" class="produtos-grid" aria-label="Lista de produtos"></section>
    </main>
</body>
</html>
